##########
# [TIME] #
##########
[time]
disabled = true
use_12hr = true
utc_time_offset = "local"
time_format = "%I:%M %p"
style = "bg:lavender"
format = '[[ t = $time ](fg:crust bg:paper)]($style)'

######################
# [COMMAND DURATION] #
######################
[cmd_duration]
show_milliseconds = true
format = " Ô»î in $duration"
style = "fg:crust"
disabled = false
show_notifications = true
min_time_to_notify = 45000

[line_break]
disabled = false

