#############
# [MODULES] #
#############
[os]
disabled = false
style = "bg:red fg:crust"
format = '[ $symbol ]($style)'

[os.symbols]
Windows = "¾░ı▓"
Linux = "¾░î¢"

[username]
show_always = true
style_user = "bg:red fg:crust"
style_root = "bg:red fg:crust"
format = '[$user ]($style)'

[directory]
style = "bg:gold fg:crust"
format = "[ $path ]($style)"
truncation_length = 4
truncate_to_repo = true
truncation_symbol = "Ô©½ "

[directory.substitutions]
"Documents" = "¾░êÖ "
"Downloads" = "´Ç¥ "
"Music" = "¾░ØÜ "
"Pictures" = "´Ç¥ "
"Developer" = "¾░▓ï "

[localip]
disabled = true
ssh_only = false
format = '[ ­Éïâ $localipv4 ]($style)'
style = "bg:gold fg:crust"

[git_branch]
disabled = false
symbol = "´Éİ"
style = "bg:amber"
format = '[[ $symbol $branch ](fg:crust bg:green)]($style)'

[git_status]
disabled = false
style = "bg:amber"
format = '[[($all_status $ahead_behind)](fg:crust bg:green)]($style)'

[git_metrics]
disabled = true
added_style = 'bg:green fg:crust'
deleted_style = 'bg:green fg:gold'
format = '[+$added]($added_style)/[-$deleted]($deleted_style)'

[package]
disabled = false
symbol = "­şùü "
style = "208 bold"
format = '[ $symbol $version ]($style)'

