#############
# [MODULES] #
#############
[os]
disabled = false
style = "bg:red fg:crust"
format = '[ $symbol]($style)'

[os.symbols]
Windows = "¾░ì▓"
Linux = "¾░î¢"

[username]
show_always = true
style_user = "bg:red fg:crust"
style_root = "bg:red fg:crust"
format = '[ $user ]($style)'

[directory]
style = "bg:maroon fg:crust"
format = "[ $path ]($style)"
truncation_length = 4
truncate_to_repo = true
truncation_symbol = "Ô©½ "

[directory.substitutions]
"Documents" = "¾░êÖ "
"Downloads" = "´Ç¥ "
"Music" = "¾░ØÜ "
"Pictures" = "´Ç¥ "
"Developer" = "¾░▓ï "

[localip]
ssh_only = false
format = '[ ­Éïâ $localipv4 ]($style)'
style = "bg:gold fg:crust"
disabled = true

[git_branch]
symbol = "´Éÿ"
style = "bg:yellow"
format = '[[ $symbol $branch ](fg:crust bg:yellow)]($style)'

[git_status]
style = "bg:yellow"
format = '[[($all_status $ahead_behind)](fg:crust bg:yellow)]($style)'

[git_metrics]
added_style = 'bg:blue fg:crust'
format = '[+$added]($added_style)/[-$deleted]($deleted_style) '

##########################
# [PROGRAMING LANGUAGES] #
##########################
[nodejs]
symbol = "¯£ÿ"
style = "bg:flamingo"
format = '[[ $symbol($version) ](fg:crust bg:flamingo)]($style)'

[c]
symbol = "¯ÿ×"
style = "bg:flamingo"
format = '[[ $symbol ($version) ](fg:crust bg:flamingo)]($style)'

[java]
symbol = "¯ëû"
style = "bg:flamingo"
format = '[[ $symbol (Java v$version) ](fg:crust bg:flamingo)]($style)'

[rust]
symbol = "¯×¿"
style = "bg:flamingo"
format = '[[ $symbol ($version) ](fg:crust bg:flamingo)]($style)'

[python]
symbol = "¯ÿå"
style = "bg:flamingo"
format = '[[ $symbol ($version) (\($virtualenv\)) ](fg:crust bg:flamingo)]($style)'

##########
# [TIME] #
##########
[time]
disabled = true
use_12hr = true
utc_time_offset = "local"
time_format = "%R"
style = "bg:lavender"
format = '[[ t = $time ](fg:crust bg:lavender)]($style)'

######################
# [COMMAND DURATION] #
######################
[cmd_duration]
show_milliseconds = true
format = " Ô»î in $duration"
style = "fg:crust"
disabled = false
show_notifications = true
min_time_to_notify = 45000

[line_break]
disabled = false

###############
# [CHARACTER] #
###############
[character]
disabled = false
success_symbol = '[Ô£Ä](fg:blue)'
error_symbol = '[Ô£ù](fg:red)'
vimcmd_symbol = '[ÔƒÇ](fg:flamingo)'
vimcmd_replace_one_symbol = '[ÔƒÇ](italic fg:lavender)'
vimcmd_replace_symbol = '[ÔƒÇ](italic fg:lavender)'
vimcmd_visual_symbol = '[ÔƒÇ](italic fg:yellow)'

