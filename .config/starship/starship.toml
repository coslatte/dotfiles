palette = 'palette2'

[palettes.palette1]
text = "#ccccb5"
crust = "#151a21"
base = "#1b2028"

red = "#e74c3c"
maroon = "#c0392b"
gold = "#f39c12"
yellow = "#e74c3c"
flamingo = "#8e44ad"
lavender = "#16a085"
blue = "#23a9d5"

[palettes.palette2]
text = "#f5f7f9"
crust = "#0c1219"
